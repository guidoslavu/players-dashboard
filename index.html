<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>THE PLAYERS 2026 · Posiciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00d97e;
      --green-dim: rgba(0,217,126,0.15);
      --red: #ff4055;
      --red-dim: rgba(255,64,85,0.15);
      --gold: #f5c842;
      --silver: #c0c8d0;
      --bronze: #cd7f32;
      --bg: #080e0a;
      --bg2: #0f1812;
      --bg3: #162019;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --text: #eef2ef;
      --text2: #a0b0a5;
      --muted: #4a5e50;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* HEADER */
    .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 16px 12px; position:sticky; top:0; z-index:100; }
    .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .logo-area { display:flex; align-items:center; gap:10px; }
    .golf-icon { width:34px; height:34px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
    .event-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; line-height:1; }
    .event-sub { font-size:11px; color:var(--text2); margin-top:2px; }
    .live-badge { display:flex; align-items:center; gap:5px; background:var(--red-dim); border:1px solid var(--red); color:var(--red); font-size:10px; font-weight:600; letter-spacing:1px; padding:4px 9px; border-radius:20px; }
    .live-dot { width:6px; height:6px; background:var(--red); border-radius:50%; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
    .status-bar { display:flex; align-items:center; justify-content:space-between; }
    .round-pill { background:var(--bg3); border:1px solid var(--border-bright); color:var(--text2); font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; }
    .last-update { font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; }

    /* PODIO */
    .podium-section { padding:16px 16px 8px; }
    .section-label { font-size:10px; font-weight:600; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
    .podium { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; align-items:end; }
    .podium-card { border-radius:14px; padding:12px 8px; text-align:center; position:relative; overflow:hidden; }
    .podium-card.p1 { background:linear-gradient(160deg,#1a1500,#0f1200); border:1px solid rgba(245,200,66,0.4); }
    .podium-card.p2 { background:linear-gradient(160deg,#141a14,#0c120c); border:1px solid rgba(192,200,208,0.25); }
    .podium-card.p3 { background:linear-gradient(160deg,#161008,#0e0c08); border:1px solid rgba(205,127,50,0.25); }
    .podium-medal { font-size:20px; margin-bottom:4px; }
    .podium-name { font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:0.5px; line-height:1.1; margin-bottom:6px; }
    .podium-card.p1 .podium-name { font-size:20px; color:var(--gold); }
    .podium-card.p2 .podium-name { color:var(--silver); }
    .podium-card.p3 .podium-name { color:var(--bronze); }
    .podium-score { font-family:'Bebas Neue',sans-serif; font-size:36px; line-height:1; }
    .podium-card.p1 .podium-score { font-size:44px; color:var(--gold); }
    .podium-card.p2 .podium-score { color:var(--silver); font-size:32px; }
    .podium-card.p3 .podium-score { color:var(--bronze); font-size:32px; }

    /* TABLA */
    .table-section { padding:8px 0 32px; }
    .tap-hint { font-size:10px; color:var(--muted); text-align:center; padding:6px 0 4px; }

    /* Header fijo de la tabla */
    .table-header {
      display:grid;
      grid-template-columns: 40px 90px 56px 1fr 1fr 1fr 1fr;
      padding:8px 12px;
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      background:var(--bg2);
      position:sticky;
      top:88px;
      z-index:50;
    }
    .th { font-size:9px; font-weight:600; letter-spacing:1px; color:var(--muted); text-transform:uppercase; text-align:center; }
    .th.left { text-align:left; }

    /* Fila de jugador */
    .player-row {
      display:grid;
      grid-template-columns: 40px 90px 56px 1fr 1fr 1fr 1fr;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      align-items:center;
      animation:fadeIn 0.3s ease both;
      cursor:pointer;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
    .player-row:active { background:var(--bg3); }

    .pos-cell { text-align:center; }
    .pos-num { font-family:'DM Mono',monospace; font-size:13px; color:var(--text2); }
    .pos-medal { font-size:18px; }

    .name-cell { overflow:hidden; }
    .player-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .score-cell-wrap { display:flex; align-items:center; justify-content:center; }
    .score-pill { font-family:'Bebas Neue',sans-serif; font-size:18px; padding:2px 8px; border-radius:7px; }
    .score-pill.neg { background:var(--green-dim); color:var(--green); }
    .score-pill.pos { background:var(--red-dim); color:var(--red); }
    .score-pill.even { background:rgba(255,255,255,0.05); color:var(--text2); }

    /* Celda de cada jugador elegido */
    .jug-cell { padding:0 3px; overflow:hidden; }
    .jug-score { font-family:'DM Mono',monospace; font-size:11px; font-weight:600; }
    .jug-score.neg { color:var(--green); }
    .jug-score.pos { color:var(--red); }
    .jug-score.even { color:var(--text2); }
    .jug-name { font-size:9px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

    /* LOADING / ERROR */
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:16px; }
    .spinner { width:32px; height:32px; border:2px solid var(--border-bright); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { color:var(--muted); font-size:13px; }
    .error-box { margin:20px 16px; background:var(--red-dim); border:1px solid var(--red); border-radius:12px; padding:16px; color:var(--red); font-size:13px; text-align:center; line-height:1.5; }
    .footer { padding:16px; text-align:center; color:var(--muted); font-size:10px; border-top:1px solid var(--border); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-area">
      <div class="golf-icon">⛳</div>
      <div>
        <div class="event-name">THE PLAYERS 2026</div>
        <div class="event-sub">Tabla de Posiciones</div>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="status-bar">
    <div class="round-pill" id="roundLabel">Cargando...</div>
    <div class="last-update" id="lastUpdate">--:--:--</div>
  </div>
</div>

<div class="podium-section">
  <div class="section-label">Podio</div>
  <div class="podium" id="podium">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>
</div>

<div class="table-section">
  <div class="section-label" style="padding:0 12px 2px">Clasificación</div>
  <div class="tap-hint">Tocá una fila para ver detalle</div>
  <div class="table-header">
    <div class="th">POS</div>
    <div class="th left">PARTICIPANTE</div>
    <div class="th">SCORE</div>
    <div class="th">JUG 1</div>
    <div class="th">JUG 2</div>
    <div class="th">JUG 3</div>
    <div class="th">JUG 4</div>
  </div>
  <div id="tableBody">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Cargando...</div></div>
  </div>
</div>

<div class="footer">Datos vía Google Sheets · Actualización cada 60s</div>

<script>
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbwOSq2NRKYQfx1g0Seaoq4m9G_iynkxefY2_XFqQFx5UQJv-BgtxNWnxCgV5Ufvm2Pyag/exec";

  // A=0 POS | B=1 PARTICIPANTE | C=2 TOP3SCORE | D=3 ESTADO | E=4 JUG1 | F=5 JUG2 | G=6 JUG3 | H=7 JUG4
  const C = { POS:0, NOMBRE:1, SCORE:2, ESTADO:3, J1:4, J2:5, J3:6, J4:7 };

  function fmt(v) {
    if (v === null || v === undefined) return '-';
    return String(v).trim() || '-';
  }

  // Parsear celda de jugador: viene como "-3 (Ludvig Åberg)" → { score: "-3", name: "Ludvig Åberg" }
  function parseJugador(val) {
    const s = fmt(val);
    if (s === '-') return { score: '-', name: '-' };
    const m = s.match(/^([+\-]?\d+|E)\s*\((.+)\)$/);
    if (m) return { score: m[1], name: m[2] };
    // Si no matchea el patrón, devolver todo como nombre
    return { score: '-', name: s };
  }

  function scoreClass(val) {
    const n = parseFloat(String(val));
    if (isNaN(n) || val === 'E') return 'even';
    return n < 0 ? 'neg' : n > 0 ? 'pos' : 'even';
  }

  function fmtScore(val) {
    const s = fmt(val);
    const n = parseFloat(s);
    if (isNaN(n)) return s === '-' ? 'E' : s;
    if (n === 0) return 'E';
    return n > 0 ? '+' + n : String(n);
  }

  function renderPodium(players) {
    const top = players.slice(0, 3);
    // Layout: 2do izq, 1ro centro, 3ro der
    const layout = [
      { p: top[1], cls: 'p2', medal: '🥈' },
      { p: top[0], cls: 'p1', medal: '🥇' },
      { p: top[2], cls: 'p3', medal: '🥉' },
    ];
    document.getElementById('podium').innerHTML = layout.map(({ p, cls, medal }) => {
      if (!p) return '<div></div>';
      return `
        <div class="podium-card ${cls}">
          <div class="podium-medal">${medal}</div>
          <div class="podium-name">${fmt(p[C.NOMBRE])}</div>
          <div class="podium-score">${fmtScore(p[C.SCORE])}</div>
        </div>`;
    }).join('');
  }

  function renderTable(players) {
    document.getElementById('tableBody').innerHTML = players.map((p, i) => {
      const pos   = fmt(p[C.POS]);
      const nombre = fmt(p[C.NOMBRE]);
      const score = fmtScore(p[C.SCORE]);
      const delay = Math.min(i * 0.02, 0.5).toFixed(2);

      const posHtml = i === 0 ? '<span class="pos-medal">🥇</span>'
                    : i === 1 ? '<span class="pos-medal">🥈</span>'
                    : i === 2 ? '<span class="pos-medal">🥉</span>'
                    : `<span class="pos-num">${pos}</span>`;

      // Parsear los 4 jugadores
      const jugs = [p[C.J1], p[C.J2], p[C.J3], p[C.J4]].map(parseJugador);

      const jugHtml = jugs.map(j => `
        <div class="jug-cell">
          <div class="jug-score ${scoreClass(j.score)}">${j.score !== '-' ? fmtScore(j.score) : '—'}</div>
          <div class="jug-name">${j.name !== '-' ? j.name : '—'}</div>
        </div>`).join('');

      return `
        <div class="player-row" style="animation-delay:${delay}s">
          <div class="pos-cell">${posHtml}</div>
          <div class="name-cell"><div class="player-name">${nombre}</div></div>
          <div class="score-cell-wrap">
            <div class="score-pill ${scoreClass(fmtScore(p[C.SCORE]))}">${score}</div>
          </div>
          ${jugHtml}
        </div>`;
    }).join('');
  }

  async function loadData() {
    try {
      const res = await fetch(SHEET_URL + '?t=' + Date.now());
      const raw = await res.json();

      if (!raw || raw.length < 3) {
        document.getElementById('tableBody').innerHTML =
          '<div class="error-box">Sin datos. Verificá que el Apps Script lea la solapa "🥇 Posiciones".</div>';
        return;
      }

      // Encontrar la primera fila de datos (col A = "🥇", "1", o número)
      let dataStart = 0;
      for (let i = 0; i < raw.length; i++) {
        const a = String(raw[i][0] || '').trim();
        const b = String(raw[i][1] || '').trim();
        // Fila de datos: col A tiene medalla o número, col B tiene nombre real
        if ((a === '🥇' || a === '1' || (!isNaN(parseInt(a)) && b !== '' && b !== 'PARTICIPANTE')) && b !== '') {
          dataStart = i;
          break;
        }
      }

      const players = raw.slice(dataStart).filter(r => String(r[C.NOMBRE]||'').trim() !== '' && String(r[C.NOMBRE]||'').trim() !== 'PARTICIPANTE');

      if (!players.length) {
        document.getElementById('tableBody').innerHTML =
          '<div class="error-box">No se encontraron participantes.</div>';
        return;
      }

      document.getElementById('roundLabel').textContent = `${players.length} participantes`;
      renderPodium(players);
      renderTable(players);

      const n = new Date();
      document.getElementById('lastUpdate').textContent =
        [n.getHours(), n.getMinutes(), n.getSeconds()].map(x => String(x).padStart(2,'0')).join(':');

    } catch(e) {
      document.getElementById('podium').innerHTML =
        `<div class="error-box" style="grid-column:1/-1">Error: ${e.message}</div>`;
      document.getElementById('tableBody').innerHTML =
        `<div class="error-box">No se pudo conectar con el sheet.</div>`;
    }
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
